# Transcription injection prompt — German phone calls (v1)
#
# This prompt is passed to the transcription model at inference time to bias
# it toward correct spellings of names, email tokens, and domain labels that
# appear in German-language contact-data calls.
#
# Mechanism:
#   - WhisperX  : injected as asr_options["initial_prompt"] at load_model() time
#   - gpt-4o-transcribe : injected as the `prompt` parameter on the API call
#                         (not supported by gpt-4o-transcribe-diarize — skipped there)
#
# Design rules (per OpenAI Whisper prompting guide):
#   - Written in the same language as the audio (German)
#   - Glossary-style, not instruction-style — the model treats this as style/
#     vocabulary biasing, not as instruction-following
#   - Compact: entity examples are grouped so the highest-value cues appear early
#   - No exact name matches with actual recording entities in this repo's dataset
#   - Each entry represents a confusable phonetic pattern observed in benchmarks
#   - Full-name + email examples are paired to bias local-part spellings
#
# Patterns addressed (derived from benchmark failures across all runs):
#   - Spanish diacritics (García→Garcia, Martínez→Martinez): use López, Rodríguez
#   - Swedish double-s (Andersson→Anderson): use Eriksson, Svensson
#   - French silent consonants (Lefebvre→Lefevre): use Renault, Beaumont
#   - Scandinavian special chars (ø, å): use Søren, Jørgensen, Bjørn
#   - German umlauts on non-German speakers' names: Möller, Küppers, Körner
#   - Ñ tilde stripped: Peña, Ibáñez, Muñoz
#   - Apostroph in Irish/French names (O'Brien→OBrien): use O'Connor, D'Angelo
#   - Polish diacritics (Wiśniewski, Wójcik)
#   - Double-letter surnames simplified (Hoffmann→Hofman type errors): Hartmann, Brückmann
#   - Email underscore vs hyphen distinction
#   - Email domain phonetic mangling (jahu→yahoo, gee-mail→gmail)

prompt: |
