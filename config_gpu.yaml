# Full GPU configuration.
#
# Transcriber: openai_llm, WhisperX, Deepgram, or Parakeet.
# Denoising:   FastEnhancer ONNX GPU.
#
# Docker:  docker build -t phonebot:gpu --build-arg INSTALL_GROUP=gpu .
# Local:   uv sync --frozen --no-dev --group gpu

transcriber: openai_llm  # openai_llm | whisperx | deepgram | parakeet
extractor_prompt_file: prompts/extraction/llm_v8_de.yaml  # extraction prompt YAML path
extraction_only: false  # true skips transcription and reads transcripts from transcriptions_path
transcriptions_path:  # path to outputs/<run_id>/transcriptions.json when extraction_only is true
diarization_enabled: false  # native for OpenAI LLM/Deepgram; integrated WhisperX path requires HF_TOKEN
gpu_enabled: true  # true enables GPU-backed backends and FastEnhancer denoising
denoising_enabled: true  # true uses FastEnhancer (ONNX GPU); install with `uv sync --group gpu`
langsmith_tracing: false  # true requires LANGSMITH_API_KEY; traces to LangSmith project

# LLM extraction
llm_extractor_model: gpt-5.5  # OpenAI chat model used by extractor: llm

# OpenAI transcription (used when transcriber: openai_llm)
openai_llm_transcriber_model: gpt-4o-transcribe  # OpenAI model for openai_llm transcription without diarization
openai_llm_diarization_model: gpt-4o-transcribe-diarize  # OpenAI model for openai_llm when diarization_enabled is true

# Deepgram (used when transcriber: deepgram)
deepgram_model: nova-2  # Deepgram model: nova-3 | nova-2 | enhanced | base
deepgram_language: de  # BCP-47 language tag, e.g. "de"; "default" = SDK default (en)

# FastEnhancer denoising
fastenhancer_model_url: https://github.com/aask1357/fastenhancer/releases/download/onnx-dns-v1.0.0/fastenhancer_l.onnx  # ONNX model URL; change variant suffix (_t/_b/_s/_m/_l).onnx or release tag
fastenhancer_hop_size: 100  # must match model variant: 256 for T/B/S, 160 for M, 100 for L

# WhisperX (used when transcriber: whisperx)
whisperx_model: large-v3  # WhisperX model size: tiny | base | small | medium | large-v2 | large-v3
whisperx_compute_type: float16  # VRAM/accuracy tradeoff: float16 | int8 | float32
whisperx_language: de  # Language hint, e.g. "de"; "auto" = auto-detect (adds ~1-2s per file)
whisperx_batch_size: 32  # Whisper ASR inference batch; reduce to 4 if CUDA OOM occurs
whisperx_vad_batch_size: 32  # VAD segmentation batch; reduce to 2 if CUDA OOM occurs

# Parakeet (used when transcriber: parakeet)
parakeet_model: nvidia/parakeet-tdt-0.6b-v3  # NeMo model ID; first run downloads ~1.2 GB to NeMo cache
parakeet_language: de-DE  # Parakeet language code, e.g. "de-DE"; "auto" = auto-detect via "multi"
